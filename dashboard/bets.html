<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PG Eyes - Bets Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0b0e14; --card:#12161f; --border:#1a1f2e;
      --text:#c9d1d9; --dim:#5a6370;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#d29922; --cyan:#39c5cf; --purple:#a371f7; --orange:#f97316;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:11px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

    .bar{background:#0d1117;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .bar .title{font-size:14px;font-weight:600;color:var(--purple);}
    .bar .meta{color:var(--dim);font-size:11px;display:flex;gap:12px;align-items:center;}
    .bar a{color:var(--cyan);text-decoration:none;border:1px solid var(--border);padding:3px 8px;border-radius:3px;transition:0.2s;}
    .bar a:hover{border-color:var(--cyan);background:rgba(57,197,207,0.1);}

    .main{flex:1;overflow-y:auto;padding:10px;}
    
    table {width:100%;border-collapse:collapse;}
    th, td {padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
    th {position:sticky;top:0;background:#0d1117;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;z-index:2;}
    
    tr:hover:not(.reason-row) {background:var(--card);}
    
    .status-PENDING {color:var(--yellow);}
    .status-SUCCESS {color:var(--green);}
    .status-FAILED {color:var(--red);}
    
    .target-PlayerBet, .target-Player {color:var(--blue);}
    .target-BankerBet, .target-Banker {color:var(--red);}
    .target-TieBet, .target-Tie {color:var(--green);}

    .btn-reason {background:none;border:1px solid var(--border);color:var(--cyan);font-family:inherit;font-size:10px;padding:2px 6px;cursor:pointer;border-radius:2px;}
    .btn-reason:hover {background:var(--card);border-color:var(--cyan);}
    
    .reason-row {display:none;background:#0d1117;}
    .reason-row.active {display:table-row;}
    .reason-content {padding:10px;font-size:10px;color:var(--dim);white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;border:1px solid rgba(255,255,255,0.05);border-radius:4px;background:#0a0c10;}
  </style>
</head>
<body>
  <div class="bar">
    <span class="title">PG Eyes - Bet Dispatch Log</span>
    <div class="meta">
      <span id="ts">Loading...</span>
      <span id="count" style="color:white;font-weight:600;">0 bets</span>
      <a href="/">← Back to Tables</a>
    </div>
  </div>
  <div class="main">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Table</th>
          <th>Round</th>
          <th>Target</th>
          <th>EV</th>
          <th>Module</th>
          <th>Outcome</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="tb">
        <tr><td colspan="8" style="text-align:center;color:var(--dim);">Loading bets...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let openedReasons = new Set();
    
    function fmtEv(v){
      if(v==null)return'—';
      const p=(v*100).toFixed(4);
      return v>=0?'+'+p+'%':p+'%';
    }

    function toggleReason(id) {
      if(openedReasons.has(id)) openedReasons.delete(id);
      else openedReasons.add(id);
      
      const el = document.getElementById('reason-' + id);
      if(el) {
        el.classList.toggle('active');
      }
    }

    function renderBet(b) {
      const d = new Date(b.time);
      const timeStr = d.toLocaleTimeString('en-GB', { timeZone: 'Asia/Singapore', hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3,'0');
      
      const targetCls = 'target-' + b.target;
      const statusCls = 'status-' + b.outcome;
      const isActive = openedReasons.has(b.id) ? 'active' : '';
      
      return `
        <tr>
          <td>${timeStr}</td>
          <td style="color:var(--cyan);font-weight:500;">${b.tableName}</td>
          <td>${b.round}</td>
          <td class="${targetCls}"><span style="background:rgba(255,255,255,0.05);padding:2px 4px;border-radius:2px;font-weight:600;">${b.target}</span></td>
          <td style="color:${b.ev>=0?'var(--green)':'var(--red)'};font-weight:600;">${fmtEv(b.ev)}</td>
          <td style="color:var(--dim)">${b.targetModule}</td>
          <td class="${statusCls}" style="font-weight:600">${b.outcome}</td>
          <td><button class="btn-reason" onclick="toggleReason('${b.id}')">View JSON</button></td>
        </tr>
        <tr id="reason-${b.id}" class="reason-row ${isActive}">
          <td colspan="8" style="padding:0;">
            <div style="padding:10px;">
              <div class="reason-content">${JSON.stringify(b.reasonState, null, 2)}</div>
            </div>
          </td>
        </tr>
      `;
    }

    let lastDataStr = '';

    async function poll(){
      try{
        const [rTables, rBets] = await Promise.all([
          fetch('/tables_state.json?'+Date.now()),
          fetch('/api/bets?'+Date.now())
        ]);
        
        if(!rTables.ok || !rBets.ok) return;
        const d = await rTables.json();
        const betsData = await rBets.json();
        
        let tsText = d.timestamp || '—';
        if (d.timestamp && d.timestamp.includes('T')) {
           const parts = d.timestamp.split('T');
           const dObj = new Date(parts[0] + 'T' + parts[1].replace(/-/g, ':') + 'Z');
           if (!isNaN(dObj)) tsText = dObj.toLocaleString('sv-SE', { timeZone: 'Asia/Singapore' });
        }
        
        const activeModulesCount = betsData.activeModules ? betsData.activeModules.length : 0;
        document.getElementById('ts').textContent = 'Last Updated: ' + tsText + ' | Active Modules: ' + activeModulesCount;
        
        const bets = betsData.betLog || [];
        document.getElementById('count').textContent = bets.length + ' bets total';
        
        const currentDataStr = JSON.stringify(bets);
        if (currentDataStr !== lastDataStr) {
          lastDataStr = currentDataStr;
          const html = bets.length 
            ? bets.map(renderBet).join('') 
            : '<tr><td colspan="8" style="text-align:center;color:var(--dim);padding:20px;">No bets logged yet.</td></tr>';
          
          document.getElementById('tb').innerHTML = html;
        }
      }catch(e){
        // silent
      }
    }
    
    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
