<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PG Eyes - Performance Stats</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0b0e14; --card:#12161f; --border:#1a1f2e;
      --text:#c9d1d9; --dim:#5a6370;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#d29922; --cyan:#39c5cf; --purple:#a371f7; --orange:#f97316;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:11px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

    .bar{background:#0d1117;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .bar .title{font-size:14px;font-weight:600;color:var(--cyan);}
    .bar a{color:var(--cyan);text-decoration:none;border:1px solid var(--border);padding:3px 8px;border-radius:3px;transition:0.2s;}
    .bar a:hover{border-color:var(--cyan);background:rgba(57,197,207,0.1);}

    .main{flex:1;overflow-y:auto;padding:20px;}
    
    .btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-family:inherit; font-weight:600; transition: all 0.2s; }
    .btn-secondary { background:#0d1117; color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { background:var(--card); }
    .btn-secondary.active { border-color:var(--cyan); color:var(--cyan); background:rgba(57,197,207,0.1); }

    .table-container { width:100%; overflow-x:auto; background:#0d1117; border:1px solid var(--border); border-radius:4px; margin-top: 15px; }
    table { width:100%; min-width:800px; border-collapse:collapse; white-space:nowrap; }
    th, td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.05); }
    th { color:var(--dim); font-weight:600; text-transform:uppercase; text-align:left; background:#0a0c10; position:sticky; top:0; z-index:2; }

    input[type="datetime-local"] {
      background:#161b22;
      color:var(--text);
      border:1px solid var(--border);
      padding:4px 8px;
      border-radius:3px;
      font-family:inherit;
      font-size:11px;
      outline:none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="datetime-local"]:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(57,197,207,0.15);
    }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(50%) saturate(1000%) hue-rotate(140deg);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="bar">
    <span class="title">Performance Stats</span>
    <div style="display:flex;gap:8px;">
      <a href="/summary" style="color:var(--orange);">Bet Summary</a>
      <a href="/stats-hypothesis" style="color:var(--yellow);">Hypothesis Backtest</a>
      <a href="https://statsdashboard.onrender.com">Central Stats ↗</a>
      <a href="/bets">← Back to Bets</a>
    </div>
  </div>
  
  <div class="main">
    <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; align-items:center;">
       <button id="btn-today" onclick="selectRange('today', this)" class="btn btn-secondary active">Today</button>
       <button id="btn-yesterday" onclick="selectRange('yesterday', this)" class="btn btn-secondary">Yesterday</button>
       <button id="btn-last_7_days" onclick="selectRange('last_7_days', this)" class="btn btn-secondary">Last 7 Days</button>
       <button id="btn-all_time" onclick="selectRange('all_time', this)" class="btn btn-secondary">All Time</button>
       <button id="btn-custom" onclick="selectRange('custom', this)" class="btn btn-secondary">Custom</button>
       
       <div id="custom-range-container" style="display:none; align-items:center; gap:8px; border:1px solid var(--border); padding:4px 8px; border-radius:4px; background:#0d1117; margin-left:10px; flex-wrap:wrap;">
         <input type="datetime-local" id="custom-from" />
         <span style="color:var(--dim);">to</span>
         <input type="datetime-local" id="custom-to" />
         <button id="btn-apply" onclick="loadStats('custom')" class="btn btn-secondary" style="border-color:var(--cyan); color:var(--cyan); background:rgba(57,197,207,0.05); padding:4px 10px;">Apply</button>
       </div>
    </div>
    <div id="stats-date-info" style="color:var(--yellow); font-size:11px; margin-bottom:10px; font-weight:600;"></div>
    
    <div class="table-container" id="stats-content">
       <div style="padding:20px; color:var(--dim); text-align:center;">Loading stats...</div>
    </div>
  </div>

  <script>
    function selectBtn(el) {
      document.querySelectorAll('.btn-secondary').forEach(btn => btn.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    function toggleCustomRange(show) {
      const container = document.getElementById('custom-range-container');
      if (show) {
        container.style.display = 'flex';
      } else {
        container.style.display = 'none';
      }
    }

    function selectRange(range, btnEl) {
      selectBtn(btnEl);
      if (range === 'custom') {
        toggleCustomRange(true);
      } else {
        toggleCustomRange(false);
      }
      loadStats(range);
    }

    function initCustomDateInputs() {
      const now = new Date();
      
      // Extract current date/time components in Malaysia time (GMT+8)
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Kuala_Lumpur",
        year: "numeric",
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "numeric",
        second: "numeric",
        hour12: false
      });
      const parts = formatter.formatToParts(now);
      const partMap = Object.fromEntries(parts.map(p => [p.type, p.value]));
      const myYear = parseInt(partMap.year);
      const myMonth = parseInt(partMap.month) - 1; // 0-indexed
      const myDay = parseInt(partMap.day);
      
      // Today 12pm in Malaysia is Date.UTC(myYear, myMonth, myDay, 4, 0, 0, 0)
      const today12pmUTC = new Date(Date.UTC(myYear, myMonth, myDay, 4, 0, 0, 0));
      
      let currentPeriodStartUTC;
      if (now < today12pmUTC) {
        currentPeriodStartUTC = new Date(today12pmUTC.getTime() - 24 * 60 * 60 * 1000);
      } else {
        currentPeriodStartUTC = today12pmUTC;
      }
      
      // Format to YYYY-MM-DDTHH:MM in Malaysia time timezone
      const toMalaysiaLocalISO = (date) => {
        const fmt = new Intl.DateTimeFormat("sv-SE", {
          timeZone: "Asia/Kuala_Lumpur",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        });
        return fmt.format(date).replace(" ", "T");
      };
      
      document.getElementById('custom-from').value = toMalaysiaLocalISO(currentPeriodStartUTC);
      document.getElementById('custom-to').value = toMalaysiaLocalISO(now);
    }

    async function loadStats(range = 'today') {
      document.getElementById('stats-content').innerHTML = '<div style="padding:20px; color:var(--dim); text-align:center;">Loading stats from database...</div>';
      document.getElementById('stats-date-info').textContent = 'Loading range...';
      try {
        let url = `/api/stats?range=${range}`;
        if (range === 'custom') {
          const fromVal = document.getElementById('custom-from').value;
          const toVal = document.getElementById('custom-to').value;
          if (!fromVal || !toVal) {
            document.getElementById('stats-content').innerHTML = '<div style="color:var(--red); padding:20px;">Please select both start and end date/time.</div>';
            document.getElementById('stats-date-info').textContent = 'Invalid custom range';
            return;
          }
          const fromISO = new Date(fromVal + "+08:00").toISOString();
          const toISO = new Date(toVal + "+08:00").toISOString();
          url += `&from=${encodeURIComponent(fromISO)}&to=${encodeURIComponent(toISO)}`;
        }
        
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok) {
           document.getElementById('stats-date-info').textContent = data.dateInfo;
           let html = '<table>';
           html += '<thead><tr><th style="padding-bottom:10px;">Node</th><th style="text-align:right; padding-bottom:10px;">Bal</th><th style="text-align:right; padding-bottom:10px;">No. of Bets</th><th style="text-align:right; padding-bottom:10px;">Avg Bet</th><th style="text-align:right; padding-bottom:10px;">PNL</th><th style="text-align:right; padding-bottom:10px;">Eff. Turnover</th><th style="text-align:right; padding-bottom:10px;">Eff. Rebate</th><th style="text-align:right; padding-bottom:10px;">Exp. Loss</th><th style="text-align:right; padding-bottom:10px;">Expected Net Profit</th></tr></thead><tbody>';
           
           for (const [node, st] of Object.entries(data.stats.nodes)) {
              html += renderStatRow(node, st);
           }
           
           html += renderStatRow('TOTAL', data.stats.total, true);
           html += '</tbody></table>';
           document.getElementById('stats-content').innerHTML = html;
        } else {
           document.getElementById('stats-content').innerHTML = '<div style="color:var(--red); padding:20px;">Failed to load stats: ' + data.error + '</div>';
        }
      } catch(e) {
        document.getElementById('stats-content').innerHTML = '<div style="color:var(--red); padding:20px;">Failed to load stats (Network error).</div>';
      }
    }

    function renderStatRow(name, st, isTotal=false) {
       const pnlSign = st.pnl > 0 ? '+' : '';
       const pnlCol = st.pnl > 0 ? 'var(--green)' : (st.pnl < 0 ? 'var(--red)' : 'var(--text)');
       
       const explSign = st.expLoss > 0 ? '+' : '';
       const explCol = st.expLoss < 0 ? 'var(--red)' : 'var(--green)';
       
       let explPercStr = '';
       if (st.effTurnover > 0) {
           const explPerc = (st.expLoss / st.effTurnover) * 100;
           explPercStr = ` <span style="font-size:9px;color:var(--dim);">(${explPerc > 0 ? '+' : ''}${explPerc.toFixed(2)}%)</span>`;
       }

       const expEvSign = st.expValue > 0 ? '+' : '';
       const expEvCol = st.expValue > 0 ? 'var(--green)' : 'var(--red)';
       let expEvPercStr = '';
       if (st.effTurnover > 0) {
           const expEvPerc = (st.expValue / st.effTurnover) * 100;
           expEvPercStr = ` <span style="font-size:9px;color:var(--dim);">(${expEvPerc > 0 ? '+' : ''}${expEvPerc.toFixed(2)}%)</span>`;
       }

       return `
         <tr style="${isTotal ? 'border-top:1px solid rgba(255,255,255,0.1); font-weight:600; background:var(--card);' : ''}">
           <td style="color:var(--cyan);">${name}</td>
           <td style="text-align:right; color:var(--text);">${st.bal.toFixed(2)}</td>
           <td style="text-align:right; color:var(--text);">${st.betCount}</td>
           <td style="text-align:right; color:var(--text);">${st.avgBet.toFixed(2)}</td>
           <td style="text-align:right; color:${pnlCol};">${pnlSign}${st.pnl.toFixed(2)}</td>
           <td style="text-align:right; color:var(--text);">${st.effTurnover.toFixed(2)}</td>
           <td style="text-align:right; color:var(--blue);">+${st.effRebate.toFixed(2)}</td>
           <td style="text-align:right; color:${explCol};">${explSign}${st.expLoss.toFixed(2)}${explPercStr}</td>
           <td style="text-align:right; color:${expEvCol};">${expEvSign}${st.expValue.toFixed(2)}${expEvPercStr}</td>
         </tr>
       `;
    }

    // Initialize custom date-time inputs and load today's stats on start
    initCustomDateInputs();
    loadStats('today');
  </script>
</body>
</html>
