<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PG Eyes - Performance Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0b0e14; --card:#12161f; --border:#1a1f2e;
      --text:#c9d1d9; --dim:#5a6370;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#d29922; --cyan:#39c5cf; --purple:#a371f7; --orange:#f97316;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:11px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

    .bar{background:#0d1117;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
    .bar .title{font-size:14px;font-weight:600;color:var(--cyan);}
    .bar a{color:var(--cyan);text-decoration:none;border:1px solid var(--border);padding:3px 8px;border-radius:3px;transition:0.2s;}
    .bar a:hover{border-color:var(--cyan);background:rgba(57,197,207,0.1);}

    .main{flex:1;overflow-y:auto;padding:20px;}
    
    .btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-family:inherit; font-weight:600; }
    .btn-secondary { background:#0d1117; color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { background:var(--card); }

    .table-container { width:100%; overflow-x:auto; background:#0d1117; border:1px solid var(--border); border-radius:4px; margin-top: 15px; }
    table { width:100%; min-width:800px; border-collapse:collapse; white-space:nowrap; }
    th, td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.05); }
    th { color:var(--dim); font-weight:600; text-transform:uppercase; text-align:left; background:#0a0c10; position:sticky; top:0; z-index:2; }
  </style>
</head>
<body>
  <div class="bar">
    <span class="title">Performance Stats</span>
    <div>
      <a href="/bets">← Back to Bets</a>
    </div>
  </div>
  
  <div class="main">
    <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
       <button onclick="loadStats('today')" class="btn btn-secondary">Today</button>
       <button onclick="loadStats('yesterday')" class="btn btn-secondary">Yesterday</button>
       <button onclick="loadStats('this_week')" class="btn btn-secondary">This Week</button>
       <button onclick="loadStats('all_time')" class="btn btn-secondary">All Time</button>
    </div>
    <div id="stats-date-info" style="color:var(--yellow); font-size:11px; margin-bottom:10px; font-weight:600;"></div>
    
    <div class="table-container" id="stats-content">
       <div style="padding:20px; color:var(--dim); text-align:center;">Loading stats...</div>
    </div>
  </div>

  <script>
    async function loadStats(range = 'today') {
      document.getElementById('stats-content').innerHTML = '<div style="padding:20px; color:var(--dim); text-align:center;">Loading stats from database...</div>';
      document.getElementById('stats-date-info').textContent = 'Loading range...';
      try {
        const res = await fetch(`/api/stats?range=${range}`);
        const data = await res.json();
        if (data.ok) {
           document.getElementById('stats-date-info').textContent = data.dateInfo;
           let html = '<table>';
           html += '<thead><tr><th style="padding-bottom:10px;">Node</th><th style="text-align:right; padding-bottom:10px;">Bal</th><th style="text-align:right; padding-bottom:10px;">No. of Bets</th><th style="text-align:right; padding-bottom:10px;">Avg Bet</th><th style="text-align:right; padding-bottom:10px;">PNL</th><th style="text-align:right; padding-bottom:10px;">Eff. Turnover</th><th style="text-align:right; padding-bottom:10px;">Eff. Rebate</th><th style="text-align:right; padding-bottom:10px;">Exp. Loss</th><th style="text-align:right; padding-bottom:10px;">Expected Net Profit</th></tr></thead><tbody>';
           
           for (const [node, st] of Object.entries(data.stats.nodes)) {
              html += renderStatRow(node, st);
           }
           
           html += renderStatRow('TOTAL', data.stats.total, true);
           html += '</tbody></table>';
           document.getElementById('stats-content').innerHTML = html;
        } else {
           document.getElementById('stats-content').innerHTML = '<div style="color:var(--red); padding:20px;">Failed to load stats: ' + data.error + '</div>';
        }
      } catch(e) {
        document.getElementById('stats-content').innerHTML = '<div style="color:var(--red); padding:20px;">Failed to load stats (Network error).</div>';
      }
    }

    function renderStatRow(name, st, isTotal=false) {
       const pnlSign = st.pnl > 0 ? '+' : '';
       const pnlCol = st.pnl > 0 ? 'var(--green)' : (st.pnl < 0 ? 'var(--red)' : 'var(--text)');
       
       const explSign = st.expLoss > 0 ? '+' : '';
       const explCol = st.expLoss > 0 ? 'var(--red)' : 'var(--green)';
       
       let explPercStr = '';
       if (st.effTurnover > 0) {
           const explPerc = (st.expLoss / st.effTurnover) * 100;
           explPercStr = ` <span style="font-size:9px;color:var(--dim);">(${explPerc > 0 ? '+' : ''}${explPerc.toFixed(2)}%)</span>`;
       }

       const expEvSign = st.expValue > 0 ? '+' : '';
       const expEvCol = st.expValue > 0 ? 'var(--green)' : 'var(--red)';
       let expEvPercStr = '';
       if (st.effTurnover > 0) {
           const expEvPerc = (st.expValue / st.effTurnover) * 100;
           expEvPercStr = ` <span style="font-size:9px;color:var(--dim);">(${expEvPerc > 0 ? '+' : ''}${expEvPerc.toFixed(2)}%)</span>`;
       }

       return `
         <tr style="${isTotal ? 'border-top:1px solid rgba(255,255,255,0.1); font-weight:600; background:var(--card);' : ''}">
           <td style="color:var(--cyan);">${name}</td>
           <td style="text-align:right; color:var(--text);">${st.bal.toFixed(2)}</td>
           <td style="text-align:right; color:var(--text);">${st.betCount}</td>
           <td style="text-align:right; color:var(--text);">${st.avgBet.toFixed(2)}</td>
           <td style="text-align:right; color:${pnlCol};">${pnlSign}${st.pnl.toFixed(2)}</td>
           <td style="text-align:right; color:var(--text);">${st.effTurnover.toFixed(2)}</td>
           <td style="text-align:right; color:var(--blue);">+${st.effRebate.toFixed(2)}</td>
           <td style="text-align:right; color:${explCol};">${explSign}${st.expLoss.toFixed(2)}${explPercStr}</td>
           <td style="text-align:right; color:${expEvCol};">${expEvSign}${st.expValue.toFixed(2)}${expEvPercStr}</td>
         </tr>
       `;
    }

    loadStats();
  </script>
</body>
</html>
